server:
  port: 9088

encrypt:
  key-store:
    location: file:/app/apiEncryptionKey.jks
    password: ${KEYSTORE_PASSWORD}
    alias: apiEncryptionKey
    secret: ${KEY_PASSWORD}

spring:
  application:
    name: config-service
  rabbitmq:
    host: rabbitmq-devops
    port: 5672
  profiles:
    active: git
  cloud:
    config:
      server:
        git: #default
          uri: https://github.com/hyuk-s-ecommerce-msa-project/ecommerce-config-repository
          default-label: main

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - beans
          - info
          - busrefresh